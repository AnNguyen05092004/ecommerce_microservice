# ============================================
# TechStore — Docker Compose
# ============================================
version: '3.8'

services:
  # ─── DATABASES ──────────────────────────────
  staff-db:
    image: mysql:8.0
    container_name: techstore-staff-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_STAFF}
      MYSQL_DATABASE: ${STAFF_DB_NAME}
      MYSQL_USER: ${STAFF_DB_USER}
      MYSQL_PASSWORD: ${STAFF_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - staff-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techstore-network

  customer-db:
    image: mysql:8.0
    container_name: techstore-customer-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_CUSTOMER}
      MYSQL_DATABASE: ${CUSTOMER_DB_NAME}
      MYSQL_USER: ${CUSTOMER_DB_USER}
      MYSQL_PASSWORD: ${CUSTOMER_DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - customer-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techstore-network

  computer-db:
    image: postgres:15
    container_name: techstore-computer-db
    environment:
      POSTGRES_DB: ${COMPUTER_DB_NAME}
      POSTGRES_USER: ${COMPUTER_DB_USER}
      POSTGRES_PASSWORD: ${COMPUTER_DB_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - computer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMPUTER_DB_USER} -d ${COMPUTER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techstore-network

