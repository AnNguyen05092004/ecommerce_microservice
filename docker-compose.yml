version: '3.8'

services:
  product-db:
    image: postgres:15
    container_name: techstore-product-db
    environment:
      POSTGRES_DB: ${PRODUCT_DB_NAME}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "15433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - techstore-network

  staff-db:
    image: mysql:8.0
    container_name: techstore-staff-db
    environment:
      MYSQL_ROOT_PASSWORD: ${STAFF_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${STAFF_DB_NAME}
      MYSQL_USER: ${STAFF_DB_USER}
      MYSQL_PASSWORD: ${STAFF_DB_PASSWORD}
    ports:
      - "13306:3306"
    volumes:
      - staff-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${STAFF_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - techstore-network

  customer-db:
    image: mysql:8.0
    container_name: techstore-customer-db
    environment:
      MYSQL_ROOT_PASSWORD: ${CUSTOMER_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${CUSTOMER_DB_NAME}
      MYSQL_USER: ${CUSTOMER_DB_USER}
      MYSQL_PASSWORD: ${CUSTOMER_DB_PASSWORD}
    ports:
      - "13307:3306"
    volumes:
      - customer-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${CUSTOMER_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - techstore-network

  staff-service:
    build:
      context: ./services/staff-service
      dockerfile: Dockerfile
    container_name: techstore-staff-service
    ports:
      - "${STAFF_SERVICE_PORT}:8001"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${STAFF_DB_NAME}
      - DB_USER=${STAFF_DB_USER}
      - DB_PASSWORD=${STAFF_DB_PASSWORD}
      - DB_HOST=staff-db
      - DB_PORT=3306
    depends_on:
      staff-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  customer-service:
    build:
      context: ./services/customer-service
      dockerfile: Dockerfile
    container_name: techstore-customer-service
    ports:
      - "${CUSTOMER_SERVICE_PORT}:8002"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${CUSTOMER_DB_NAME}
      - DB_USER=${CUSTOMER_DB_USER}
      - DB_PASSWORD=${CUSTOMER_DB_PASSWORD}
      - DB_HOST=customer-db
      - DB_PORT=3306
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL}
    depends_on:
      customer-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: techstore-identity-service
    ports:
      - "${IDENTITY_SERVICE_PORT}:8016"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8016/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: techstore-product-service
    ports:
      - "${PRODUCT_SERVICE_PORT}:8017"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${PRODUCT_DB_NAME}
      - DB_USER=${PRODUCT_DB_USER}
      - DB_PASSWORD=${PRODUCT_DB_PASSWORD}
      - DB_HOST=${PRODUCT_DB_HOST}
      - DB_PORT=${PRODUCT_DB_PORT}
    depends_on:
      product-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8017/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: techstore-inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:8018"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8018/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: techstore-cart-service
    ports:
      - "${CART_SERVICE_PORT}:8019"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8019/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: techstore-order-service
    ports:
      - "${ORDER_SERVICE_PORT}:8020"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: techstore-payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:8021"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8021/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    container_name: techstore-review-service
    ports:
      - "${REVIEW_SERVICE_PORT}:8022"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8022/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  neo4j:
    image: neo4j:5-community
    container_name: techstore-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - techstore-network

  advisor-service:
    build:
      context: ./services/advisor-service
      dockerfile: Dockerfile
    container_name: techstore-advisor-service
    ports:
      - "${ADVISOR_SERVICE_PORT}:8006"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_PATH=/app/data/advisor.sqlite3
      - ARTIFACTS_DIR=/app/artifacts
      - KB_BOOTSTRAP_PATH=/app/advisor/knowledge_base/default_documents.json
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - neo4j
    volumes:
      - advisor-data:/app/data
      - advisor-artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: techstore-gateway
    ports:
      - "${GATEWAY_PORT}:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADVISOR_SERVICE_URL=${ADVISOR_SERVICE_URL}
      - IDENTITY_SERVICE_URL=${IDENTITY_SERVICE_URL}
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL}
      - CART_SERVICE_URL=${CART_SERVICE_URL}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL}
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL}
      - REVIEW_SERVICE_URL=${REVIEW_SERVICE_URL}
      - STAFF_SERVICE_URL=${STAFF_SERVICE_URL}
      - CUSTOMER_SERVICE_URL=${CUSTOMER_SERVICE_URL}
      - SERVICES_REGISTRY=${SERVICES_REGISTRY}
    depends_on:
      - advisor-service
      - identity-service
      - product-service
      - inventory-service
      - cart-service
      - order-service
      - payment-service
      - review-service
      - staff-service
      - customer-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techstore-frontend
    ports:
      - "${FRONTEND_PORT}:8080"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - GATEWAY_URL=${GATEWAY_URL}
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

volumes:
  product-db-data:
  staff-db-data:
  customer-db-data:
  neo4j-data:
  advisor-data:
  advisor-artifacts:

networks:
  techstore-network:
    driver: bridge
