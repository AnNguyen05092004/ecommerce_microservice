    networks:
      - techstore-network

  # ─── NEO4J (Knowledge Graph) ─────────────────
  neo4j:
    image: neo4j:5-community
    container_name: techstore-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/techstore123}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - techstore-network

  advisor-service:
    build:
      context: ./services/advisor-service
      dockerfile: Dockerfile
    container_name: techstore-advisor-service
    ports:
      - "${ADVISOR_SERVICE_PORT}:8006"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_PATH=/app/data/advisor.sqlite3
      - ARTIFACTS_DIR=/app/artifacts
      - KB_BOOTSTRAP_PATH=/app/advisor/knowledge_base/default_documents.json
      - COMPUTER_SERVICE_URL=${COMPUTER_SERVICE_URL}
      - MOBILE_SERVICE_URL=${MOBILE_SERVICE_URL}
      - CLOTHES_SERVICE_URL=${CLOTHES_SERVICE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-techstore123}
    volumes:
      - advisor-data:/app/data
      - advisor-artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  # ─── API GATEWAY ────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: techstore-gateway
    ports:
      - "${GATEWAY_PORT}:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STAFF_SERVICE_URL=${STAFF_SERVICE_URL}
      - CUSTOMER_SERVICE_URL=${CUSTOMER_SERVICE_URL}
      - COMPUTER_SERVICE_URL=${COMPUTER_SERVICE_URL}
      - MOBILE_SERVICE_URL=${MOBILE_SERVICE_URL}
      - CLOTHES_SERVICE_URL=${CLOTHES_SERVICE_URL}
      - TABLET_SERVICE_URL=${TABLET_SERVICE_URL}
      - AUDIO_SERVICE_URL=${AUDIO_SERVICE_URL}
      - WEARABLE_SERVICE_URL=${WEARABLE_SERVICE_URL}
      - COMPONENT_SERVICE_URL=${COMPONENT_SERVICE_URL}
      - PERIPHERAL_SERVICE_URL=${PERIPHERAL_SERVICE_URL}
      - MONITOR_SERVICE_URL=${MONITOR_SERVICE_URL}
      - ACCESSORY_SERVICE_URL=${ACCESSORY_SERVICE_URL}
      - CHARGING_SERVICE_URL=${CHARGING_SERVICE_URL}
      - BOOK_SERVICE_URL=${BOOK_SERVICE_URL}
      - ADVISOR_SERVICE_URL=${ADVISOR_SERVICE_URL}
    depends_on:
      - staff-service
      - customer-service
      - computer-service
      - mobile-service
      - clothes-service
      - tablet-service
      - audio-service
      - wearable-service
      - component-service
      - peripheral-service
      - monitor-service
      - accessory-service
      - charging-service
      - book-service
      - advisor-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - techstore-network

  # ─── FRONTEND ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techstore-frontend
    ports:
      - "${FRONTEND_PORT}:8080"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - GATEWAY_URL=${GATEWAY_URL}
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - techstore-network

volumes:
  staff-db-data:
  customer-db-data:
  computer-db-data:
  mobile-db-data:
  clothes-db-data:
  tablet-db-data:
  audio-db-data:
  wearable-db-data:
  component-db-data:
  peripheral-db-data:
  monitor-db-data:
  accessory-db-data:
  charging-db-data:
  book-db-data:
  advisor-data:
  advisor-artifacts:
  neo4j-data:

networks:
  techstore-network:
    driver: bridge
